[build]
  command = "npm run build"
  publish = "dist"

# ── Bot prerendering ─────────────────────────────────────────────────
# This is a client-rendered React SPA: the source #root is empty and all
# content is built by JS. Search + AI crawlers that don't execute JS
# (GPTBot, ClaudeBot, PerplexityBot, Bingbot, Seznam) would otherwise see
# a blank page. Netlify Prerendering serves a fully-rendered HTML snapshot
# to bot user-agents from Netlify's infra — no headless Chrome in our own
# build, so it can't break CI.
#   NOTE: also enable Prerendering in the Netlify UI
#   (Site settings → Build & deploy → Prerendering → Enable),
#   the env flag alone is not always sufficient.

[build.environment]
  NODE_VERSION = "18"
  NETLIFY_PRERENDER = "true"
  # Allow Supabase anon key in build output (it's meant to be public for client-side apps)
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    # Explicitly indexable — counters any default "X-Robots-Tag: none"
    # that the host might inject. Search Console flagged the prior
    # `none` value as the reason every URL was excluded from the index.
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"

# Private routes — header-level noindex on top of the HTML meta robots,
# so user-account pages are never indexed even if a third party links
# directly to them.
[[headers]]
  for = "/profile/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/cart/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/onboarding/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/messages/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/auth/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# PWA manifest — explicit MIME so Cloudflare/Netlify don't 403 it on
# WebKit (the spec MIME is `application/manifest+json`; some hosts
# served `text/html` which Safari/Chromium reject with a fetch error).
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

# Sitemap / robots — explicit text types so the file isn't downloaded
# instead of inlined when accessed directly.
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sitemap-blog.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
    Cache-Control = "public, max-age=3600"
