    <!-- TITLE: head term first, value prop second, brand last. Mirrors
         what Google bolds in SERPs. Kept under 60 chars to avoid SERP
         truncation. -->
    <title>CS2 Marketplace · Buy & Sell CS2 Skins · 0% Fees · Skinify</title>

    <!-- DESCRIPTION: 158 chars, leads with intent words ("buy", "sell",
         "CS2 skins"), differentiator ("0% buyer fees, escrow"), trust
         signal ("instant Steam delivery"). No emojis — they cut CTR in
         Google SERPs even when they survive truncation. -->
    <meta name="description" content="Buy and sell CS2 skins safely on Skinify. 0% buyer fees, escrow-protected trades, instant Steam delivery. AK-47, AWP, Karambit, knives, gloves & cases." />

    <!-- Google ignores keywords meta, but Yandex + Seznam (CZ) still use
         it. Kept tight and intent-aligned for those engines. -->
    <meta name="keywords" content="cs2 marketplace, cs2 skins, buy cs2 skins, sell cs2 skins, counter-strike 2 marketplace, csgo skins, ak-47 skins, awp skins, karambit, m9 bayonet, sport gloves, cs2 trading, steam marketplace alternative, 0 fee cs2 marketplace, p2p cs2 trading" />

    <!-- ─────────────────────────────────────────────────────────────
         JSON-LD graph
         Consolidated into a single @graph so Google's rich-results
         parser sees one coherent entity model:
           Organization ← publishes ← WebSite (with SearchAction so
           Google can show a search box for the brand) ← OnlineStore
           which the homepage represents.
         Per-page schema (Product, BreadcrumbList, ItemList, FAQPage,
         CollectionPage) is injected at runtime by useDocumentMeta so
         each route emits its own.
         ───────────────────────────────────────────────────────────── */
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://skinify.gg/#org",
          "name": "Skinify",
          "legalName": "LosSelloutos s.r.o.",
          "url": "https://skinify.gg/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://skinify.gg/og-cover.png",
            "width": 1200,
            "height": 630
          },
          "foundingDate": "2025-10-17",
          "address": {
            "@type": "PostalAddress",
            "streetAddress": "Bělehradská 858/23",
            "addressLocality": "Praha",
            "postalCode": "120 00",
            "addressCountry": "CZ"
          },
          "contactPoint": [{
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "support@skinify.gg",
            "availableLanguage": ["English", "Czech"],
            "areaServed": "Worldwide",
            "hoursAvailable": "Mo-Su 00:00-23:59"
          }],
          "taxID": "06448771",
          "vatID": "CZ06448771",
          "sameAs": [
            "https://twitter.com/SkinifyCS2",
            "https://discord.gg/skinify",
            "https://github.com/skinify",
            "https://www.youtube.com/@skinify"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://skinify.gg/#website",
          "url": "https://skinify.gg/",
          "name": "Skinify",
          "description": "Peer-to-peer CS2 marketplace with 0% buyer fees and escrow-protected trades.",
          "publisher": { "@id": "https://skinify.gg/#org" },
          "inLanguage": "en",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://skinify.gg/marketplace?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "OnlineStore",
          "@id": "https://skinify.gg/#store",
          "name": "Skinify Marketplace",
          "url": "https://skinify.gg/marketplace",
          "image": "https://skinify.gg/og-cover.png",
          "description": "Buy and sell CS2 skins, knives, gloves, and cases with 0% buyer fees and escrow protection.",
          "currenciesAccepted": "CZK, EUR, USD, GBP, PLN, HUF",
          "paymentAccepted": "Credit Card, Debit Card, PayPal, SEPA, Bitcoin, Ethereum, USDT",
          "priceRange": "0.50 – 50000",
          "parentOrganization": { "@id": "https://skinify.gg/#org" },
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.9",
            "reviewCount": "1287",
            "bestRating": "5",
            "worstRating": "1"
          }
        },
        {
          "@type": "WebApplication",
          "name": "Skinify",
          "url": "https://skinify.gg/",
          "applicationCategory": "GameApplication",
          "applicationSubCategory": "Marketplace",
          "operatingSystem": "Web Browser",
          "browserRequirements": "Requires JavaScript. Requires HTML5.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD",
            "description": "Free to use, 0% buyer fees on every trade"
          },
          "featureList": [
            "Buy CS2 skins with escrow protection",
            "Sell CS2 skins peer-to-peer",
            "AK-47, AWP, M4A4, Karambit, M9 Bayonet inventories",
            "Custom shop storefront",
            "Real-time Steam price sync",
            "Instant Steam trade-offer delivery"
          ]
        }
      ]
    }
    </script>
    <!-- Google Translate -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        // Initialize translate widget in header
        if (document.getElementById('google_translate_element')) {
          new google.translate.TranslateElement(
            {
              pageLanguage: 'en',
              includedLanguages: 'en,cs,de,es,fr,pl,ru,zh-CN,ja,ko,pt,it,tr,ar',
              layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
              autoDisplay: false
            },
            'google_translate_element'
          );
        }

        // Initialize translate widget in landing page settings
        setTimeout(function() {
          if (document.getElementById('google_translate_element_landing')) {
            new google.translate.TranslateElement(
              {
                pageLanguage: 'en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
              },
              'google_translate_element_landing'
            );
          }
        }, 500);
      }
    </script>
    <!-- Pinned to https:// — a protocol-relative URL resolves to http:// on
         the dev server, which our CSP correctly blocks (script-src only
         allows the https variant). -->
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
