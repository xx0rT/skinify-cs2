<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Float Extraction Test</title>
  <style>
    body {
      font-family: monospace;
      max-width: 1200px;
      margin: 20px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .container {
      background: #2a2a2a;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #444;
    }
    input {
      width: 400px;
      background: #1a1a1a;
      color: #fff;
    }
    button {
      background: #4a90e2;
      color: white;
      cursor: pointer;
      border: none;
    }
    button:hover {
      background: #357abd;
    }
    pre {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .error {
      color: #ff6b6b;
    }
    .success {
      color: #51cf66;
    }
    .warning {
      color: #ffd43b;
    }
    .highlight {
      background: #4a90e2;
      padding: 2px 4px;
      border-radius: 2px;
    }
    h2 {
      color: #4a90e2;
      border-bottom: 2px solid #4a90e2;
      padding-bottom: 10px;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
    }
    .status.loading {
      background: #2c5282;
    }
    .status.success {
      background: #2d6a4f;
    }
    .status.error {
      background: #9b2c2c;
    }
  </style>
</head>
<body>
  <h1>🔍 CS2 Float Extraction Debugger</h1>

  <div class="container">
    <h2>Configuration</h2>
    <div>
      <label>Supabase Project URL:</label><br>
      <input type="text" id="supabaseUrl" placeholder="https://your-project.supabase.co" style="width: 500px;">
    </div>
    <div>
      <label>Supabase Anon Key:</label><br>
      <input type="text" id="supabaseKey" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." style="width: 500px;">
    </div>
    <div>
      <label>Steam ID:</label><br>
      <input type="text" id="steamId" placeholder="76561198012345678 or custom URL">
    </div>
  </div>

  <div class="container">
    <h2>Tests</h2>
    <button onclick="testDebugMode()">🔍 Test Debug Mode (See Raw Steam Data)</button>
    <button onclick="testNormalMode()">📦 Test Normal Mode (Processed Items)</button>
    <button onclick="testFirstItem()">🎯 Test Single Item Float Extraction</button>
  </div>

  <div id="status" class="status" style="display: none;"></div>

  <div class="container">
    <h2>Results</h2>
    <div id="results"></div>
  </div>

  <script>
    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status ${type}`;
      status.style.display = 'block';
    }

    function showResults(html) {
      document.getElementById('results').innerHTML = html;
    }

    async function testDebugMode() {
      const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
      const supabaseKey = document.getElementById('supabaseKey').value.trim();
      const steamId = document.getElementById('steamId').value.trim();

      if (!supabaseUrl || !supabaseKey || !steamId) {
        alert('Please fill in all fields');
        return;
      }

      showStatus('Fetching debug data from Steam API...', 'loading');
      showResults('');

      try {
        const url = `${supabaseUrl}/functions/v1/user-inventory?steamId=${steamId}&debug=true`;

        const response = await fetch(url, {
          headers: {
            'Authorization': `Bearer ${supabaseKey}`,
            'Content-Type': 'application/json',
          }
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Request failed');
        }

        showStatus('✅ Debug data retrieved successfully!', 'success');

        let html = '<h3>Debug Information</h3>';
        html += '<div style="background: #1a1a1a; padding: 10px; border-radius: 4px; margin: 10px 0;">';
        html += `<div>Success: <span class="${data.success ? 'success' : 'error'}">${data.success}</span></div>`;
        html += `<div>Total Items: <span class="highlight">${data.total_count || 0}</span></div>`;
        html += `<div>Assets Count: <span class="highlight">${data.assets_count || 0}</span></div>`;
        html += `<div>Descriptions Count: <span class="highlight">${data.descriptions_count || 0}</span></div>`;
        html += `<div>Has Asset Properties: <span class="${data.has_asset_properties ? 'success' : 'error'}">${data.has_asset_properties}</span></div>`;
        html += `<div>Asset Properties Count: <span class="highlight">${data.asset_properties_count || 0}</span></div>`;
        html += '</div>';

        if (!data.has_asset_properties) {
          html += '<div class="warning" style="padding: 10px; background: #5a3e1b; border-radius: 4px; margin: 10px 0;">';
          html += '⚠️ WARNING: Steam did not return asset_properties in this response!<br>';
          html += 'This means float values are not available from Steam for this inventory.';
          html += '</div>';
        }

        if (data.sample_asset) {
          html += '<h3>Sample Asset (First Item)</h3>';
          html += `<pre>${JSON.stringify(data.sample_asset, null, 2)}</pre>`;
        }

        if (data.sample_description) {
          html += '<h3>Sample Description</h3>';
          html += `<pre>${JSON.stringify(data.sample_description, null, 2)}</pre>`;
        }

        if (data.sample_asset_property) {
          html += '<h3>Sample Asset Property (Float Data)</h3>';
          html += `<pre>${JSON.stringify(data.sample_asset_property, null, 2)}</pre>`;

          if (data.sample_asset_property.asset_properties) {
            const floatProp = data.sample_asset_property.asset_properties.find(p => p.propertyid === 2);
            const patternProp = data.sample_asset_property.asset_properties.find(p => p.propertyid === 1);

            if (floatProp && floatProp.float_value) {
              html += `<div class="success" style="padding: 10px; background: #1a4731; border-radius: 4px; margin: 10px 0;">`;
              html += `✅ Float Value Found: <span class="highlight">${floatProp.float_value}</span>`;
              html += '</div>';
            }

            if (patternProp && patternProp.int_value) {
              html += `<div class="success" style="padding: 10px; background: #1a4731; border-radius: 4px; margin: 10px 0;">`;
              html += `✅ Pattern Found: <span class="highlight">${patternProp.int_value}</span>`;
              html += '</div>';
            }
          }
        } else {
          html += '<div class="error" style="padding: 10px; background: #4a1a1a; border-radius: 4px; margin: 10px 0;">';
          html += '❌ No sample_asset_property found - Steam did not provide float data';
          html += '</div>';
        }

        if (data.first_5_assets) {
          html += `<h3>First 5 Assets</h3>`;
          html += `<pre>${JSON.stringify(data.first_5_assets, null, 2)}</pre>`;
        }

        if (data.first_5_asset_properties) {
          html += `<h3>First 5 Asset Properties</h3>`;
          html += `<pre>${JSON.stringify(data.first_5_asset_properties, null, 2)}</pre>`;
        }

        html += '<h3>Full Response Keys</h3>';
        html += `<pre>${JSON.stringify(data.full_response_keys, null, 2)}</pre>`;

        showResults(html);

      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
        showResults(`<pre class="error">${error.stack || error.message}</pre>`);
      }
    }

    async function testNormalMode() {
      const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
      const supabaseKey = document.getElementById('supabaseKey').value.trim();
      const steamId = document.getElementById('steamId').value.trim();

      if (!supabaseUrl || !supabaseKey || !steamId) {
        alert('Please fill in all fields');
        return;
      }

      showStatus('Fetching processed inventory...', 'loading');
      showResults('');

      try {
        const url = `${supabaseUrl}/functions/v1/user-inventory?steamId=${steamId}`;

        const response = await fetch(url, {
          headers: {
            'Authorization': `Bearer ${supabaseKey}`,
            'Content-Type': 'application/json',
          }
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Request failed');
        }

        showStatus(`✅ Retrieved ${data.items.length} items`, 'success');

        let html = '<h3>Processed Items Summary</h3>';
        html += `<div>Total Items: <span class="highlight">${data.items.length}</span></div>`;

        const itemsWithFloat = data.items.filter(item => item.float && item.float !== 'N/A');
        const itemsWithPattern = data.items.filter(item => item.pattern);

        html += `<div>Items with Float: <span class="${itemsWithFloat.length > 0 ? 'success' : 'error'}">${itemsWithFloat.length}</span></div>`;
        html += `<div>Items with Pattern: <span class="${itemsWithPattern.length > 0 ? 'success' : 'warning'}">${itemsWithPattern.length}</span></div>`;

        if (itemsWithFloat.length === 0) {
          html += '<div class="error" style="padding: 10px; background: #4a1a1a; border-radius: 4px; margin: 10px 0;">';
          html += '❌ NO FLOAT VALUES FOUND IN ANY ITEMS!<br>';
          html += 'This means the edge function is not extracting float values correctly.';
          html += '</div>';
        }

        html += '<h3>First 5 Items</h3>';
        data.items.slice(0, 5).forEach((item, i) => {
          html += `<div style="background: #1a1a1a; padding: 10px; border-radius: 4px; margin: 10px 0;">`;
          html += `<strong>${i + 1}. ${item.name}</strong><br>`;
          html += `Market Name: ${item.market_name}<br>`;
          html += `Asset ID: ${item.assetid}<br>`;
          html += `Float: <span class="${item.float && item.float !== 'N/A' ? 'success' : 'error'}">${item.float || 'N/A'}</span><br>`;
          html += `Pattern: <span class="${item.pattern ? 'success' : 'warning'}">${item.pattern || 'N/A'}</span><br>`;
          html += `Price: $${item.price_estimate.toFixed(2)}`;
          html += '</div>';
        });

        html += '<h3>Full Response</h3>';
        html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;

        showResults(html);

      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
        showResults(`<pre class="error">${error.stack || error.message}</pre>`);
      }
    }

    async function testFirstItem() {
      const supabaseUrl = document.getElementById('supabaseUrl').value.trim();
      const supabaseKey = document.getElementById('supabaseKey').value.trim();
      const steamId = document.getElementById('steamId').value.trim();

      if (!supabaseUrl || !supabaseKey || !steamId) {
        alert('Please fill in all fields');
        return;
      }

      showStatus('Testing single item float extraction...', 'loading');
      showResults('');

      try {
        const url = `${supabaseUrl}/functions/v1/user-inventory?steamId=${steamId}`;

        const response = await fetch(url, {
          headers: {
            'Authorization': `Bearer ${supabaseKey}`,
            'Content-Type': 'application/json',
          }
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Request failed');
        }

        if (!data.items || data.items.length === 0) {
          throw new Error('No items in inventory');
        }

        const item = data.items[0];

        showStatus('✅ First item retrieved', 'success');

        let html = '<h3>First Item Analysis</h3>';
        html += '<div style="background: #1a1a1a; padding: 15px; border-radius: 4px;">';
        html += `<div><strong>Name:</strong> ${item.name}</div>`;
        html += `<div><strong>Market Name:</strong> ${item.market_name}</div>`;
        html += `<div><strong>Type:</strong> ${item.type}</div>`;
        html += `<div><strong>Condition:</strong> ${item.condition}</div>`;
        html += `<div><strong>Rarity:</strong> ${item.rarity}</div>`;
        html += `<div><strong>Asset ID:</strong> ${item.assetid}</div>`;
        html += `<div><strong>Class ID:</strong> ${item.classid || 'N/A'}</div>`;
        html += '</div>';

        html += '<h3>Float Extraction Result</h3>';
        if (item.float && item.float !== 'N/A') {
          html += '<div class="success" style="padding: 15px; background: #1a4731; border-radius: 4px;">';
          html += `✅ <strong>FLOAT FOUND:</strong> <span class="highlight">${item.float}</span>`;
          html += '</div>';
        } else {
          html += '<div class="error" style="padding: 15px; background: #4a1a1a; border-radius: 4px;">';
          html += `❌ <strong>NO FLOAT VALUE</strong><br>`;
          html += `Float field value: ${JSON.stringify(item.float)}`;
          html += '</div>';
        }

        if (item.pattern) {
          html += '<div class="success" style="padding: 15px; background: #1a4731; border-radius: 4px; margin-top: 10px;">';
          html += `✅ <strong>PATTERN FOUND:</strong> <span class="highlight">${item.pattern}</span>`;
          html += '</div>';
        }

        html += '<h3>Full Item Data</h3>';
        html += `<pre>${JSON.stringify(item, null, 2)}</pre>`;

        showResults(html);

      } catch (error) {
        showStatus(`❌ Error: ${error.message}`, 'error');
        showResults(`<pre class="error">${error.stack || error.message}</pre>`);
      }
    }
  </script>
</body>
</html>
